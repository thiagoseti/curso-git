name: Pipeline DevOps HTML

on:
  push:
    branches:
      - main

jobs:

  validacao:
    name: Validação do Projeto
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Mostrar estrutura do projeto
        run: ls -la

      - name: Verificar arquivos HTML
        run: find . -name "*.html"

      - name: Verificar README
        run: |
          if [ -f README.md ]; then
            echo "README encontrado"
          else
            echo "README não encontrado"
            exit 1
          fi

      # Aqui você cria a pasta build e joga o index.html nela
      - name: Simular Build
        run: |
          mkdir build
          cp index.html build/
          echo "Build criada com sucesso"

      # Upload do artefato padrão do workflow
      - name: Upload da Build
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: build/

  deploy:
    name: Deploy GitHub Pages
    needs: validacao
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # Em vez de clonar o git de novo, baixamos o artefato gerado no job anterior
      - name: Baixar Artefato da Build
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ./dist # Baixa o conteúdo direto para uma pasta chamada 'dist'

      # O upload-pages-artifact prepara o pacote específico para o GitHub Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Aponta para a pasta onde extraímos o artefato válido

      # Faz o deploy oficial
      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v4